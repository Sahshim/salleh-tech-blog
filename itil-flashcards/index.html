<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧠 ITIL FlashCards</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 2em;
    }
    .card {
      border: 2px solid #ccc;
      padding: 1em;
      border-radius: 10px;
      display: inline-block;
      max-width: 600px;
      background-color: #f9f9f9;
    }
    button {
      margin: 1em;
    }
  </style>
</head>
<body>
  <h1>🧠 <strong>ITIL FlashCards</strong></h1>
  <div class="card">
    <div id="flashcard">Loading...</div>
    <br />
    <button onclick="showDefinition()">Show Definition</button>
    <button onclick="nextCard()">Next</button>
  </div>

  <script>
    // Updated to use Firebase Hosting URL
    const flashcardUrl = "https://sallehitilflashcard.web.app/itil_flashcards_data.json";

    let flashcards = [];
    let currentIndex = 0;
    let showingDefinition = false;

    fetch(flashcardUrl)
      .then(response => {
        if (!response.ok) throw new Error("Network response was not ok");
        return response.json();
      })
      .then(data => {
        flashcards = data;
        displayCard();
      })
      .catch(error => {
        document.getElementById("flashcard").textContent = "❌ Failed to load flashcards.";
        console.error("Flashcard loading error:", error);
      });

    function displayCard() {
      const card = flashcards[currentIndex];
      document.getElementById("flashcard").textContent = showingDefinition ? card.definition : card.term;
    }

    function showDefinition() {
      showingDefinition = true;
      displayCard();
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % flashcards.length;
      showingDefinition = false;
      displayCard();
    }
  </script>
</body>
</html>
