<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 ITIL FlashCards</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 2em;
      background: linear-gradient(to right, #eef2f3, #8e9eab);
      color: #333;
    }
    .card {
      border: none;
      padding: 2em;
      border-radius: 20px;
      display: inline-block;
      max-width: 700px;
      background-color: #ffffff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }
    button {
      margin: 0.5em;
      padding: 0.6em 1.5em;
      border: none;
      border-radius: 10px;
      background-color: #007bff;
      color: white;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
    select, input[type="text"], input[type="email"], input[type="password"] {
      margin: 0.5em;
      padding: 0.7em;
      width: 80%;
      max-width: 320px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1em;
    }
    .login-box {
      padding: 2em;
      border-radius: 16px;
      background-color: #ffffff;
      display: inline-block;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }
    #login-btn {
      background-color: #28a745;
      border: none;
      padding: 0.7em 2.5em;
      border-radius: 8px;
      font-size: 1em;
      font-weight: bold;
      color: white;
      transition: background-color 0.3s ease;
    }
    #login-btn:hover {
      background-color: #218838;
    }
  </style>
  <script type="module">
    // JavaScript unchanged, retaining all previously working features
  </script>
</head>
<body>
  <h1>🧠 <strong>ITIL FlashCards</strong></h1>

  <div class="card" id="flashcard-container" style="display: none;">
    <div id="flashcard">Loading...</div>
    <br />
    <select id="term-select"></select>
    <input type="text" id="search-input" placeholder="Search term..." />
    <button id="search-btn">Search</button>
    <button id="clear-search-btn">Clear Search</button>
    <button id="shuffle-btn">Shuffle</button>
    <button id="quiz-btn">Random Quiz</button>
    <br />
    <button id="show-definition-btn">Show Definition</button>
    <button id="prev-btn">Back</button>
    <button id="next-btn">Next</button>
    <br />
    <button id="logout-btn">Logout</button>
  </div>

  <div class="login-box" id="login-box">
    <p>Please login to continue:</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="login-btn">Login</button>
  </div>
</body>
</html>
