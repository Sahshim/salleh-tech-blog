<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 ITIL FlashCards</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 2em;
    }
    .card {
      border: 2px solid #ccc;
      padding: 1em;
      border-radius: 10px;
      display: inline-block;
      max-width: 600px;
      background-color: #f9f9f9;
    }
    button {
      margin: 1em;
    }
    .login-box {
      border: 2px solid #ccc;
      padding: 2em;
      border-radius: 10px;
      background-color: #f9f9f9;
      display: inline-block;
    }
    input {
      display: block;
      margin: 0.5em auto;
      padding: 0.5em;
      width: 80%;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwZuvAXmkp1RzJeWs9LrNcmg-m1QR0zpE",
      authDomain: "sallehitilflashcard.firebaseapp.com",
      projectId: "sallehitilflashcard",
      storageBucket: "sallehitilflashcard.appspot.com",
      messagingSenderId: "83258180991",
      appId: "1:83258180991:web:a17c49a403b240bfdec64a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const flashcardUrl = "https://sallehitilflashcard.web.app/itil_flashcards_data.json";
    let flashcards = [];
    let currentIndex = 0;
    let showingDefinition = false;

    function displayCard() {
      const card = flashcards[currentIndex];
      document.getElementById("flashcard").textContent = showingDefinition ? card.definition : card.term;
    }

    function showDefinition() {
      showingDefinition = true;
      displayCard();
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % flashcards.length;
      showingDefinition = false;
      displayCard();
    }

    function fetchFlashcards() {
      fetch(flashcardUrl)
        .then(response => {
          if (!response.ok) throw new Error("Network response was not ok");
          return response.json();
        })
        .then(data => {
          flashcards = data;
          displayCard();
        })
        .catch(error => {
          document.getElementById("flashcard").textContent = "❌ Failed to load flashcards.";
          console.error("Flashcard loading error:", error);
        });
    }

    document.getElementById("login-btn").addEventListener("click", () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          document.getElementById("login-box").style.display = "none";
          document.getElementById("flashcard-container").style.display = "inline-block";
          fetchFlashcards();
        })
        .catch(error => {
          alert("Login failed: " + error.message);
        });
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      signOut(auth).then(() => {
        document.getElementById("flashcard-container").style.display = "none";
        document.getElementById("login-box").style.display = "inline-block";
      });
    });

    document.getElementById("show-definition-btn").addEventListener("click", showDefinition);
    document.getElementById("next-btn").addEventListener("click", nextCard);

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("login-box").style.display = "none";
        document.getElementById("flashcard-container").style.display = "inline-block";
        fetchFlashcards();
      } else {
        document.getElementById("flashcard-container").style.display = "none";
        document.getElementById("login-box").style.display = "inline-block";
      }
    });
  </script>
</head>
<body>
  <h1>🧠 <strong>ITIL FlashCards</strong></h1>

  <div class="card" id="flashcard-container" style="display: none;">
    <div id="flashcard">Loading...</div>
    <br />
    <button id="show-definition-btn">Show Definition</button>
    <button id="next-btn">Next</button>
    <br />
    <button id="logout-btn">Logout</button>
  </div>

  <div class="login-box" id="login-box">
    <p>Please login to continue:</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="login-btn">Login</button>
  </div>
</body>
</html>
