<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITIL FlashCards</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #term,
    #definition {
      margin: 1rem 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🧠 ITIL FlashCards</h1>
    <div id="term">Loading...</div>
    <div id="definition" style="display: none;"></div>
    <button onclick="showDefinition()">Show Definition</button>
    <button onclick="nextFlashcard()">Next</button>
  </div>

  <script>
    const flashcardUrl = "https://firebasestorage.googleapis.com/v0/b/sallehitilflashcard.firebasestorage.app/o/itil_flashcards_data.json?alt=media&token=92794f92-0417-4962-b2dc-381b853f1363";

    let flashcards = [];
    let currentIndex = 0;

    fetch(flashcardUrl)
      .then((res) => {
        if (!res.ok) {
          throw new Error("Failed to fetch flashcard data.");
        }
        return res.json();
      })
      .then((data) => {
        flashcards = data;
        currentIndex = 0;
        displayFlashcard();
      })
      .catch((error) => {
        document.getElementById("term").textContent = "Failed to load flashcards.";
        console.error(error);
      });

    function displayFlashcard() {
      document.getElementById("definition").style.display = "none";
      document.getElementById("definition").textContent = flashcards[currentIndex].definition;
      document.getElementById("term").textContent = flashcards[currentIndex].term;
    }

    function showDefinition() {
      document.getElementById("definition").style.display = "block";
    }

    function nextFlashcard() {
      currentIndex = (currentIndex + 1) % flashcards.length;
      displayFlashcard();
    }
  </script>
</body>

</html>
