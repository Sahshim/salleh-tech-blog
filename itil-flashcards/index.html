<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 ITIL FlashCards</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 2em;
    }
    .card {
      border: 2px solid #ccc;
      padding: 1em;
      border-radius: 10px;
      display: inline-block;
      max-width: 600px;
      background-color: #f9f9f9;
    }
    button {
      margin: 1em;
    }
    .login-box {
      border: 2px solid #ccc;
      padding: 2em;
      border-radius: 10px;
      background-color: #f9f9f9;
      display: inline-block;
    }
    input {
      display: block;
      margin: 0.5em auto;
      padding: 0.5em;
      width: 80%;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
</head>
<body>
  <h1>🧠 <strong>ITIL FlashCards</strong></h1>

  <div class="card" id="flashcard-container" style="display: none;">
    <div id="flashcard">Loading...</div>
    <br />
    <button onclick="showDefinition()">Show Definition</button>
    <button onclick="nextCard()">Next</button>
    <br />
    <button onclick="logout()">Logout</button>
  </div>

  <div class="login-box" id="login-box">
    <p>Please login to continue:</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCwZuvAXmkp1RzJeWs9LrNcmg-m1QR0zpE",
      authDomain: "sallehitilflashcard.firebaseapp.com",
      projectId: "sallehitilflashcard",
      storageBucket: "sallehitilflashcard.firebasestorage.app",
      messagingSenderId: "83258180991",
      appId: "1:83258180991:web:a17c49a403b240bfdec64a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const flashcardUrl = "https://firebasestorage.googleapis.com/v0/b/sallehitilflashcard.firebasestorage.app/o/itil_flashcards_data.json?alt=media&token=92794f92-0417-4962-b2dc-381b853f1363";
    let flashcards = [];
    let currentIndex = 0;
    let showingDefinition = false;

    function displayCard() {
      const card = flashcards[currentIndex];
      document.getElementById("flashcard").textContent = showingDefinition ? card.definition : card.term;
    }

    function showDefinition() {
      showingDefinition = true;
      displayCard();
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % flashcards.length;
      showingDefinition = false;
      displayCard();
    }

    function fetchFlashcards() {
      fetch(flashcardUrl)
        .then(response => {
          if (!response.ok) throw new Error("Network response was not ok");
          return response.json();
        })
        .then(data => {
          flashcards = data;
          displayCard();
        })
        .catch(error => {
          document.getElementById("flashcard").textContent = "❌ Failed to load flashcards.";
          console.error("Flashcard loading error:", error);
        });
    }

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          document.getElementById("login-box").style.display = "none";
          document.getElementById("flashcard-container").style.display = "inline-block";
          fetchFlashcards();
        })
        .catch(error => {
          alert("Login failed: " + error.message);
        });
    }

    function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("Account created. You can now login.");
        })
        .catch(error => {
          alert("Sign up failed: " + error.message);
        });
    }

    function logout() {
      auth.signOut().then(() => {
        document.getElementById("flashcard-container").style.display = "none";
        document.getElementById("login-box").style.display = "inline-block";
      });
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById("login-box").style.display = "none";
        document.getElementById("flashcard-container").style.display = "inline-block";
        fetchFlashcards();
      } else {
        document.getElementById("flashcard-container").style.display = "none";
        document.getElementById("login-box").style.display = "inline-block";
      }
    });
  </script>
</body>
</html>
